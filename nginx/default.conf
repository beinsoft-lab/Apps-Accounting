# ══════════════════════════════════════════════════════════════════════════════
# Beinsoft Accounting — Nginx reverse proxy
# Domain  : demo.beinsoft.co.id
#
# TO ADD A NEW APP (e.g. pos.beinsoft.co.id):
#   1. Clone/copy this file structure for the new app
#   2. Add a new `upstream` block below
#   3. Add a new `server` block mirroring this one
#   4. Update docker-compose.yml nginx service to mount the new conf
# ══════════════════════════════════════════════════════════════════════════════

upstream accounting_app {
    server app:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name demo.beinsoft.co.id;
    return 301 https://demo.beinsoft.co.id$request_uri;
}

# ── HTTPS (Cloudflare Origin Certificate) ─────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name demo.beinsoft.co.id;

    ssl_certificate     /etc/ssl/cloudflare/demo.beinsoft.co.id.pem;
    ssl_certificate_key /etc/ssl/cloudflare/demo.beinsoft.co.id.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options        "SAMEORIGIN"                             always;
    add_header X-Content-Type-Options "nosniff"                                always;
    add_header X-XSS-Protection       "1; mode=block"                          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"        always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript image/svg+xml;

    client_max_body_size 10M;

    # ── Next.js static assets (immutable, cache forever) ─────────────────────
    location /_next/static/ {
        proxy_pass         http://accounting_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        expires        1y;
        add_header     Cache-Control "public, max-age=31536000, immutable";
        access_log     off;
    }

    # ── Public folder ─────────────────────────────────────────────────────────
    location /public/ {
        proxy_pass         http://accounting_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        expires            7d;
        add_header         Cache-Control "public, max-age=604800";
        access_log         off;
    }

    # ── All other requests → Next.js ─────────────────────────────────────────
    location / {
        proxy_pass         http://accounting_app;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass    $http_upgrade;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
    }
}

