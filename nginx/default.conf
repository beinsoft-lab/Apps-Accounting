# Beinsoft Accounting — Nginx reverse proxy
# Upstream: Next.js app container on port 3000

upstream nextjs_app {
    server app:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript image/svg+xml;

    client_max_body_size 10M;

    # ── Next.js static assets (immutable cache) ────────────────────────────
    location /_next/static/ {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Static files from Next.js are content-hashed — safe to cache forever
        expires        1y;
        add_header     Cache-Control "public, max-age=31536000, immutable";
        access_log     off;
    }

    # ── Public folder (favicon, images, etc.) ─────────────────────────────
    location /public/ {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        expires            7d;
        add_header         Cache-Control "public, max-age=604800";
        access_log         off;
    }

    # ── All other requests → Next.js ──────────────────────────────────────
    location / {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        # Disable buffering for SSE / streaming responses
        proxy_buffering     off;
    }
}
